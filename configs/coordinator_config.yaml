coordinator:
  port: 8000
  host: "0.0.0.0"

trust:
  ema_alpha: 0.9          # decay factor — 0.9 means recent beats dominate
  quarantine_threshold: 0.4
  suspicious_threshold: 0.7
  normalization_ceiling: 10.0  # max divergence before full penalty

detection:
  mahalanobis_alert_threshold: 3.5
  window_size: 50          # rolling history per agent
  min_samples_for_detection: 10  # baseline warmup